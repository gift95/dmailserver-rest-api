<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DockerMailServer 邮箱注册</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📧 DockerMailServer</h1>
            <p>邮箱服务</p>
        </div>
        
        <div class="nav-tabs">            
            <button class="tab-btn active" onclick="showTab('register')">注册</button>
            <button class="tab-btn" onclick="showTab('admin')">管理员</button>
        </div>


        <!-- 注册页面 -->
        <div id="register-tab" class="tab-content active">
            <h2>注册新邮箱</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>邮箱地址</label>
                    <input type="email" id="register-email" required placeholder="yourname@{{.MAIL_HOST}}">
                    <small>只能使用 @{{.MAIL_HOST}} 域名</small>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="register-password" required minlength="8">
                    <small>至少8位字符</small>
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="register-confirm" required>
                </div>
                <button type="submit" class="btn-primary">注册</button>
            </form>
            <div id="register-message" class="message"></div>
        </div>

        <!-- 管理员页面 -->
        <div id="admin-tab" class="tab-content">
            <h2>管理员登录</h2>
            <form id="adminForm">
                <div class="form-group">
                    <label>API密钥</label>
                    <input type="password" id="admin-api-key" required placeholder="输入API密钥">
                </div>
                <button type="submit" class="btn-primary">进入管理后台</button>
            </form>
        </div>
    </div>

    <!-- 管理后台 (初始隐藏) -->
    <div id="admin-dashboard" style="display: none;">
        <div class="dashboard-header">
            <h2>📊 邮件系统管理后台</h2>
            <button onclick="logoutAdmin()" class="btn-secondary">退出</button>
        </div>
        
        <div class="dashboard-tabs">
            <button class="dashboard-tab active" onclick="showDashboardTab('users')">用户管理</button>
            <button class="dashboard-tab" onclick="showDashboardTab('aliases')">别名管理</button>
            <button class="dashboard-tab" onclick="showDashboardTab('fail2ban')">Fail2ban</button>
            <button class="dashboard-tab" onclick="showDashboardTab('stats')">系统状态</button>
        </div>

        <!-- 用户管理 -->
        <div id="users-tab" class="dashboard-content active">
            <h3>📋 邮箱账户列表</h3>
            <button onclick="refreshUsers()" class="btn-secondary">刷新</button>
            <div id="users-list" class="data-list"></div>
        </div>

        <!-- 别名管理 -->
        <div id="aliases-tab" class="dashboard-content">
            <h3>🔗 邮箱别名管理</h3>
            <div class="alias-form">
                <input type="email" id="alias-email" placeholder="主邮箱地址">
                <input type="text" id="alias-address" placeholder="别名地址">
                <button onclick="addAliasFromForm()" class="btn-primary">添加别名</button>
            </div>
            <div id="aliases-list" class="data-list"></div>
        </div>

        <!-- Fail2ban管理 -->
        <div id="fail2ban-tab" class="dashboard-content">
            <h3>🚫 Fail2ban IP封禁管理</h3>
            <div class="fail2ban-form">
                <input type="text" id="ban-ip" placeholder="IP地址">
                <button onclick="addBan()" class="btn-primary">封禁IP</button>
            </div>
            <div id="fail2ban-list" class="data-list"></div>
        </div>

        <!-- 系统状态 -->
        <div id="stats-tab" class="dashboard-content">
            <h3>📊 系统状态</h3>
            <div id="system-stats" class="stats-grid"></div>
        </div>
    </div>

    <script>
        // 全局配置变量
        const MAIL_HOST = "{{.MAIL_HOST}}";
    </script>
    <script src="/js/app.js"></script>
</body>
</html>
